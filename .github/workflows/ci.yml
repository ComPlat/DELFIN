name: CI

# Automated gate for every push to main and every pull request. The suite is
# fully mocked (no live KIT/Ollama/Claude calls), so no secrets are required.
#
# Two tiers (tests/conftest.py auto-marks the heavy + order-dependent tests
# `slow`):
#   - `tests` (fast gate, REQUIRED): everything EXCEPT the slow set. ~minutes.
#     This is the merge gate.
#   - `slow-tests` (informational, non-blocking): the heavy MANTA build tests
#     (construct full complexes; the full serial suite is >60 min) plus a few
#     order-dependent tests that only pass in the full serial context. Run here
#     with a long timeout. Promote to required once test isolation/speed is
#     improved so the slow set can rejoin the gate.
on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch/PR to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history: test_pre_refactor_api_preserved.py compares the public
          # API against a pre-refactor commit via `git show`. A shallow clone
          # lacks it -> 0 cases -> that guard test fails.
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[agent,docs,dev]"

      - name: Run fast test suite (excludes heavy + order-dependent tests)
        run: pytest -q -m "not slow"

  slow-tests:
    name: slow tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Informational while heavy-test speed + test isolation are improved.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[agent,docs,dev]"

      - name: Run slow (heavy + order-dependent) tests
        run: pytest -q -m "slow"
