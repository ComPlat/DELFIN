name: CI

# Automated gate for every push to main and every pull request. The suite is
# fully mocked (no live KIT/Ollama/Claude calls), so no secrets are required.
#
# Runs the FULL suite serially. A fast/slow split (pytest -m) and parallel
# execution (pytest-xdist) were both tried and BOTH break the suite: several
# tests are order-dependent (they rely on module-level state another test sets
# up — e.g. a runtime-mutated _ENTRY_POINTS, sys.modules-driven scans) and only
# pass in the full serial context. Speeding CI up therefore requires fixing
# test isolation first (tracked as an optimisation task), not subsetting.
on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch/PR to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    # The MANTA build/integration tests construct full complexes and are slow
    # (slowest single test ~130s); the full serial suite needs well over the
    # old 30 min. 60 gives headroom until test speed/isolation is improved.
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history: test_pre_refactor_api_preserved.py compares the public
          # API against a pre-refactor commit via `git show`. A shallow clone
          # lacks it -> 0 cases -> that guard test fails.
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[agent,docs,dev]"

      - name: Run test suite
        run: pytest -q
