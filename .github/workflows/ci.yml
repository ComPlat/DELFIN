name: CI

# Automated gate for every push to main and every pull request. The suite is
# fully mocked (no live KIT/Ollama/Claude calls), so no secrets are required.
#
# Two tiers (tests/conftest.py auto-marks the heavy + order-dependent tests
# `slow`):
#   - `tests` (fast gate, REQUIRED): everything EXCEPT the slow set. ~minutes.
#     This is the merge gate that runs on every push/PR.
#   - `slow-tests` (informational): the heavy MANTA build tests (construct full
#     complexes; the full serial suite is >90 min) plus a few order-dependent
#     tests that only pass in the full serial context. These DO NOT fit a
#     per-commit gate (they time out and mark the whole run "cancelled"), so
#     they run NIGHTLY on a schedule (and on manual dispatch) instead — keeping
#     every push/PR green while still exercising the heavy suite daily. Promote
#     back into the gate once test isolation/speed is improved.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Nightly heavy-suite run (03:17 UTC) — see slow-tests job.
    - cron: "17 3 * * *"
  workflow_dispatch:

# Cancel superseded runs on the same branch/PR to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history: test_pre_refactor_api_preserved.py compares the public
          # API against a pre-refactor commit via `git show`. A shallow clone
          # lacks it -> 0 cases -> that guard test fails.
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[agent,docs,dev]"

      - name: Run fast test suite (excludes heavy + order-dependent tests)
        run: pytest -q -m "not slow"

  slow-tests:
    name: slow tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    # Nightly / manual only — never on push or PR, so a timeout here can never
    # mark a per-commit run "cancelled". The fast gate above is the merge check.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 240
    # Informational while heavy-test speed + test isolation are improved.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[agent,docs,dev]"

      - name: Run slow (heavy + order-dependent) tests
        run: pytest -q -m "slow"
